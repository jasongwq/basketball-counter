name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Generate version and timestamp
        id: version
        run: |
          # 获取当前日期作为版本号 (YY.MM.DD.BUILD_NUM)
          DATE_PART=$(TZ='Asia/Shanghai' date '+%y.%m.%d')
          # 使用 GitHub run number 作为当天构建序号
          BUILD_NUM=${{ github.run_number }}
          VERSION="${DATE_PART}.${BUILD_NUM}"
          TIMESTAMP=$(TZ='Asia/Shanghai' date '+%Y/%m/%d %H:%M:%S')
          
          echo "export const BUILD_VERSION = '${VERSION}';" > src/version.ts
          echo "export const BUILD_TIME = '${TIMESTAMP}';" >> src/version.ts
          
          echo "Generated version: ${VERSION}"
          echo "Generated timestamp: ${TIMESTAMP}"
          cat src/version.ts
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
      - name: Setup Pages
        uses: actions/configure-pages@v4
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'dist'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
