name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 0
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Get current version
        id: version
        run: |
          git fetch origin tag v* 2>/dev/null || true
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          CURRENT_VERSION=${LAST_TAG#v}
          MAJOR=$(echo $CURRENT_VERSION | cut -d'.' -f1)
          MINOR=$(echo $CURRENT_VERSION | cut -d'.' -f2)
          PATCH=$(echo $CURRENT_VERSION | cut -d'.' -f3)
          PATCH=$((PATCH + 1))
          NEW_VERSION="$MAJOR.$MINOR.$PATCH"
          NEW_TAG="v$NEW_VERSION"
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "tag=$NEW_TAG" >> $GITHUB_OUTPUT
          UPDATE_TIME=$(date -u '+%Y-%m-%dT%H:%M:%SZ')
          echo "update_time=$UPDATE_TIME" >> $GITHUB_OUTPUT
      - name: Install dependencies
        run: npm ci
      - name: Create build-time version
        run: |
          mkdir -p src
          echo 'export const BUILD_VERSION = "${{ steps.version.outputs.version }}";' > src/version.ts
          echo "const BUILD_TIME_RAW = '${{ steps.version.outputs.update_time }}';" >> src/version.ts
          echo "const BUILD_TIME_DATE = new Date(BUILD_TIME_RAW.replace('Z', '+00:00'));" >> src/version.ts
          echo 'export const BUILD_TIME = BUILD_TIME_DATE.toLocaleString("zh-CN", { hour12: false, timeZoneName: "short" });' >> src/version.ts
          cat src/version.ts
      - name: Build
        run: npm run build
      - name: Tag version
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git tag ${{ steps.version.outputs.tag }}
          git push origin ${{ steps.version.outputs.tag }}
      - name: Setup Pages
        uses: actions/configure-pages@v4
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'dist'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
