<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏀 篮球拍球计数器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Helvetica', 'Arial', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: white;
            overflow-x: hidden;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            text-align: center;
            padding: 30px 0;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #FF6B35, #F7B32B);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            color: #94a3b8;
            font-size: 1rem;
        }

        .main-content {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
            margin-top: 20px;
        }

        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
            }
        }

        .visualizer-container {
            background: linear-gradient(135deg, rgba(26, 26, 46, 0.9), rgba(15, 76, 117, 0.3));
            border-radius: 20px;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        .visualizer-label {
            position: absolute;
            top: 15px;
            left: 15px;
            font-size: 0.875rem;
            font-weight: 600;
            color: white;
            z-index: 10;
        }

        .waveform-label {
            bottom: 15px;
            top: auto;
        }

        canvas {
            width: 100%;
            height: 200px;
            border-radius: 12px;
            background: rgba(0, 0, 0, 0.3);
        }

        #spectrumCanvas {
            height: 250px;
        }

        #waveformCanvas {
            height: 100px;
            margin-top: 10px;
        }

        #particleCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .control-panel {
            background: linear-gradient(135deg, rgba(26, 26, 46, 0.9), rgba(15, 76, 117, 0.3));
            border-radius: 20px;
            padding: 25px;
            margin-top: 20px;
        }

        .control-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .control-title {
            font-size: 1.125rem;
            font-weight: 600;
        }

        .status-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.875rem;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #6b7280;
        }

        .status-dot.active {
            background: #22c55e;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .button-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .btn {
            flex: 1;
            min-width: 120px;
            padding: 14px 24px;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #FF6B35, #F97316);
            color: white;
        }

        .btn-primary:hover {
            background: linear-gradient(135deg, #F97316, #FF6B35);
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(255, 107, 53, 0.4);
        }

        .btn-danger {
            background: linear-gradient(135deg, #ef4444, #dc2626);
            color: white;
        }

        .btn-danger:hover {
            background: linear-gradient(135deg, #dc2626, #ef4444);
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(239, 68, 68, 0.4);
        }

        .btn-secondary {
            background: linear-gradient(135deg, #4b5563, #374151);
            color: white;
        }

        .btn-secondary:hover:not(:disabled) {
            background: linear-gradient(135deg, #374151, #4b5563);
            transform: translateY(-2px);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .stats-panel {
            background: linear-gradient(135deg, rgba(26, 26, 46, 0.9), rgba(15, 76, 117, 0.3));
            border-radius: 20px;
            padding: 25px;
        }

        .stats-count {
            text-align: center;
            margin-bottom: 25px;
        }

        .count-number {
            font-size: 5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #FF6B35, #F7B32B);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1;
        }

        .count-label {
            font-size: 0.875rem;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 10px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: rgba(55, 65, 81, 0.5);
            border-radius: 12px;
            padding: 15px;
            text-align: center;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            color: #FF6B35;
        }

        .stat-label {
            font-size: 0.75rem;
            color: #94a3b8;
            margin-top: 5px;
        }

        .performance-badge {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: rgba(55, 65, 81, 0.5);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 20px;
        }

        .performance-icon {
            font-size: 1.5rem;
        }

        .performance-text {
            font-size: 1.125rem;
            font-weight: 600;
        }

        .performance-professional { color: #fbbf24; }
        .performance-excellent { color: #22c55e; }
        .performance-good { color: #3b82f6; }
        .performance-active { color: #94a3b8; }
        .performance-idle { color: #6b7280; }

        .stats-details {
            margin-bottom: 20px;
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .detail-label {
            color: #94a3b8;
            font-size: 0.875rem;
        }

        .detail-value {
            font-weight: 600;
        }

        .detail-value.cyan { color: #22d3ee; }
        .detail-value.purple { color: #a855f7; }

        .sensitivity-control {
            margin-top: 20px;
        }

        .sensitivity-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .sensitivity-label {
            color: #94a3b8;
            font-size: 0.875rem;
        }

        .sensitivity-value {
            color: #FF6B35;
            font-weight: 600;
        }

        .slider-container {
            position: relative;
        }

        input[type="range"] {
            width: 100%;
            height: 8px;
            border-radius: 4px;
            background: #374151;
            outline: none;
            -webkit-appearance: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: linear-gradient(135deg, #FF6B35, #F97316);
            cursor: pointer;
            box-shadow: 0 2px 10px rgba(255, 107, 53, 0.4);
        }

        input[type="range"]::-moz-range-thumb {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: linear-gradient(135deg, #FF6B35, #F97316);
            cursor: pointer;
            border: none;
        }

        input[type="range"]:disabled {
            opacity: 0.5;
        }

        .slider-labels {
            display: flex;
            justify-content: space-between;
            margin-top: 5px;
            font-size: 0.75rem;
            color: #6b7280;
        }

        .tips-card {
            background: linear-gradient(135deg, rgba(255, 107, 53, 0.1), rgba(247, 179, 43, 0.1));
            border: 1px solid rgba(255, 107, 53, 0.2);
            border-radius: 16px;
            padding: 20px;
            margin-top: 20px;
        }

        .tips-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }

        .tips-icon {
            font-size: 1.5rem;
        }

        .tips-title {
            color: #FF6B35;
            font-weight: 600;
            font-size: 1rem;
        }

        .tips-content {
            color: #94a3b8;
            font-size: 0.875rem;
            line-height: 1.6;
        }

        .permission-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 20px;
        }

        .modal-content {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            border-radius: 24px;
            padding: 40px;
            max-width: 450px;
            width: 100%;
            text-align: center;
        }

        .modal-icon {
            font-size: 4rem;
            margin-bottom: 20px;
        }

        .modal-title {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 15px;
        }

        .modal-description {
            color: #94a3b8;
            margin-bottom: 25px;
            line-height: 1.6;
        }

        .modal-btn {
            width: 100%;
            padding: 16px;
            font-size: 1.125rem;
        }

        .modal-privacy {
            color: #6b7280;
            font-size: 0.75rem;
            margin-top: 15px;
        }

        .hidden {
            display: none !important;
        }

        footer {
            text-align: center;
            padding: 40px 20px;
            color: #6b7280;
            font-size: 0.75rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🏀 篮球拍球计数器</h1>
            <p class="subtitle">实时识别并统计您的篮球拍球次数</p>
        </header>

        <div class="main-content">
            <div>
                <div class="visualizer-container">
                    <canvas id="particleCanvas"></canvas>
                    <span class="visualizer-label">频谱分析</span>
                    <canvas id="spectrumCanvas"></canvas>
                    <span class="visualizer-label waveform-label">波形显示</span>
                    <canvas id="waveformCanvas"></canvas>
                </div>

                <div class="control-panel">
                    <div class="control-header">
                        <h3 class="control-title">控制面板</h3>
                        <div class="status-indicator">
                            <div class="status-dot" id="statusDot"></div>
                            <span id="statusText">已停止</span>
                        </div>
                    </div>

                    <div class="button-group">
                        <button class="btn btn-primary" id="startBtn">▶ 开始检测</button>
                        <button class="btn btn-danger hidden" id="stopBtn">⏹ 停止检测</button>
                        <button class="btn btn-secondary" id="resetBtn" disabled>🔄 重置</button>
                    </div>
                </div>
            </div>

            <div>
                <div class="stats-panel">
                    <div class="stats-count">
                        <div class="count-number" id="dribbleCount">0</div>
                        <div class="count-label">篮球拍球次数</div>
                    </div>

                    <div class="stats-grid">
                        <div class="stat-card">
                            <div class="stat-value" id="frequency">0.0</div>
                            <div class="stat-label">次/分钟</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-value" id="duration">00:00</div>
                            <div class="stat-label">训练时长</div>
                        </div>
                    </div>

                    <div class="performance-badge">
                        <span class="performance-icon" id="performanceIcon">⏳</span>
                        <span class="performance-text performance-idle" id="performanceText">待开始</span>
                    </div>

                    <div class="stats-details">
                        <div class="detail-row">
                            <span class="detail-label">峰值频率</span>
                            <span class="detail-value cyan" id="peakFrequency">--</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label">平均能量</span>
                            <span class="detail-value purple" id="avgEnergy">0.0</span>
                        </div>
                    </div>

                    <div class="sensitivity-control">
                        <div class="sensitivity-header">
                            <span class="sensitivity-label">检测灵敏度</span>
                            <span class="sensitivity-value" id="thresholdValue">80</span>
                        </div>
                        <div class="slider-container">
                            <input type="range" id="thresholdSlider" min="30" max="180" value="80" disabled>
                            <div class="slider-labels">
                                <span>高灵敏度</span>
                                <span>低灵敏度</span>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="tips-card">
                    <div class="tips-header">
                        <span class="tips-icon">💡</span>
                        <span class="tips-title">使用提示</span>
                    </div>
                    <p class="tips-content">
                        调整灵敏度阈值可以过滤环境噪音。建议在安静环境下使用此应用进行篮球拍球训练。
                    </p>
                </div>
            </div>
        </div>

        <footer>
            <p>使用 Web Audio API 和 Canvas 实现实时音频分析</p>
        </footer>
    </div>

    <div class="permission-modal" id="permissionModal">
        <div class="modal-content">
            <div class="modal-icon">🎤</div>
            <h2 class="modal-title">需要麦克风权限</h2>
            <p class="modal-description">
                为了检测篮球拍球声音，请允许访问您的麦克风。
            </p>
            <button class="btn btn-primary modal-btn" id="grantPermissionBtn">授权并开始</button>
            <p class="modal-privacy">您的麦克风音频仅在本地处理，不会上传到任何服务器。</p>
        </div>
    </div>

    <script>
        class BasketballDribbleCounter {
            constructor() {
                this.audioContext = null;
                this.analyser = null;
                this.source = null;
                this.stream = null;
                this.isListening = false;
                this.isDetecting = false;
                
                this.dribbleCount = 0;
                this.startTime = null;
                this.lastDribbleTime = null;
                this.peakFrequency = 0;
                this.energyHistory = [];
                this.lastDribbleCount = 0;
                
                this.energyThreshold = 80;
                this.minHitInterval = 250;
                
                this.particles = [];
                
                this.initCanvas();
                this.initEventListeners();
            }

            initCanvas() {
                this.spectrumCanvas = document.getElementById('spectrumCanvas');
                this.waveformCanvas = document.getElementById('waveformCanvas');
                this.particleCanvas = document.getElementById('particleCanvas');
                
                this.spectrumCtx = this.spectrumCanvas.getContext('2d');
                this.waveformCtx = this.waveformCanvas.getContext('2d');
                this.particleCtx = this.particleCanvas.getContext('2d');
                
                this.resizeCanvases();
                window.addEventListener('resize', () => this.resizeCanvases());
            }

            resizeCanvases() {
                const dpr = window.devicePixelRatio || 1;
                
                const spectrumRect = this.spectrumCanvas.getBoundingClientRect();
                this.spectrumCanvas.width = spectrumRect.width * dpr;
                this.spectrumCanvas.height = spectrumRect.height * dpr;
                this.spectrumCtx.scale(dpr, dpr);
                
                const waveformRect = this.waveformCanvas.getBoundingClientRect();
                this.waveformCanvas.width = waveformRect.width * dpr;
                this.waveformCanvas.height = waveformRect.height * dpr;
                this.waveformCtx.scale(dpr, dpr);
                
                const particleRect = this.particleCanvas.getBoundingClientRect();
                this.particleCanvas.width = particleRect.width * dpr;
                this.particleCanvas.height = particleRect.height * dpr;
                this.particleCtx.scale(dpr, dpr);
            }

            initEventListeners() {
                document.getElementById('grantPermissionBtn').addEventListener('click', () => this.start());
                document.getElementById('startBtn').addEventListener('click', () => this.start());
                document.getElementById('stopBtn').addEventListener('click', () => this.stop());
                document.getElementById('resetBtn').addEventListener('click', () => this.reset());
                
                const thresholdSlider = document.getElementById('thresholdSlider');
                thresholdSlider.addEventListener('input', (e) => {
                    this.energyThreshold = parseInt(e.target.value);
                    document.getElementById('thresholdValue').textContent = this.energyThreshold;
                });
            }

            async start() {
                try {
                    this.stream = await navigator.mediaDevices.getUserMedia({
                        audio: {
                            echoCancellation: false,
                            noiseSuppression: false,
                            autoGainControl: false
                        }
                    });

                    this.audioContext = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 44100 });
                    
                    if (this.audioContext.state === 'suspended') {
                        await this.audioContext.resume();
                    }

                    this.source = this.audioContext.createMediaStreamSource(this.stream);
                    this.analyser = this.audioContext.createAnalyser();
                    this.analyser.fftSize = 256;
                    this.analyser.smoothingTimeConstant = 0.3;
                    this.analyser.minDecibels = -90;
                    this.analyser.maxDecibels = -10;
                    
                    this.source.connect(this.analyser);
                    
                    this.frequencyData = new Uint8Array(this.analyser.frequencyBinCount);
                    this.timeDomainData = new Uint8Array(this.analyser.fftSize);
                    
                    this.isListening = true;
                    this.isDetecting = true;
                    this.startTime = Date.now();
                    
                    document.getElementById('permissionModal').classList.add('hidden');
                    document.getElementById('startBtn').classList.add('hidden');
                    document.getElementById('stopBtn').classList.remove('hidden');
                    document.getElementById('thresholdSlider').disabled = false;
                    
                    this.updateStatus(true);
                    this.detectLoop();
                    this.renderLoop();
                    
                } catch (error) {
                    console.error('初始化音频失败:', error);
                    alert('无法访问麦克风: ' + error.message);
                }
            }

            stop() {
                this.isListening = false;
                this.isDetecting = false;
                
                if (this.stream) {
                    this.stream.getTracks().forEach(track => track.stop());
                }
                
                if (this.source) {
                    this.source.disconnect();
                }
                
                if (this.audioContext && this.audioContext.state !== 'closed') {
                    this.audioContext.close();
                }
                
                document.getElementById('startBtn').classList.remove('hidden');
                document.getElementById('stopBtn').classList.add('hidden');
                document.getElementById('thresholdSlider').disabled = true;
                
                this.updateStatus(false);
            }

            reset() {
                this.dribbleCount = 0;
                this.startTime = null;
                this.lastDribbleTime = null;
                this.peakFrequency = 0;
                this.energyHistory = [];
                this.lastDribbleCount = 0;
                
                document.getElementById('dribbleCount').textContent = '0';
                document.getElementById('frequency').textContent = '0.0';
                document.getElementById('duration').textContent = '00:00';
                document.getElementById('peakFrequency').textContent = '--';
                document.getElementById('avgEnergy').textContent = '0.0';
                document.getElementById('performanceIcon').textContent = '⏳';
                document.getElementById('performanceText').textContent = '待开始';
                document.getElementById('performanceText').className = 'performance-text performance-idle';
                document.getElementById('resetBtn').disabled = true;
            }

            updateStatus(isActive) {
                const statusDot = document.getElementById('statusDot');
                const statusText = document.getElementById('statusText');
                
                if (isActive) {
                    statusDot.classList.add('active');
                    statusText.textContent = '检测中';
                } else {
                    statusDot.classList.remove('active');
                    statusText.textContent = '已停止';
                }
            }

            detectLoop() {
                if (!this.isDetecting) return;

                this.analyser.getByteFrequencyData(this.frequencyData);
                this.analyser.getByteTimeDomainData(this.timeDomainData);

                let sum = 0;
                for (let i = 0; i < this.frequencyData.length; i++) {
                    sum += this.frequencyData[i] * this.frequencyData[i];
                }
                const energy = Math.sqrt(sum / this.frequencyData.length);

                let maxIndex = 0;
                let maxValue = 0;
                for (let i = 0; i < this.frequencyData.length; i++) {
                    if (this.frequencyData[i] > maxValue) {
                        maxValue = this.frequencyData[i];
                        maxIndex = i;
                    }
                }
                const nyquist = 22050;
                const frequency = (maxIndex * nyquist) / this.frequencyData.length;
                
                if (frequency > this.peakFrequency) {
                    this.peakFrequency = frequency;
                }

                this.energyHistory.push(energy);
                if (this.energyHistory.length > 100) {
                    this.energyHistory.shift();
                }

                const avgEnergy = this.energyHistory.reduce((a, b) => a + b, 0) / this.energyHistory.length;
                const currentTime = Date.now();

                const isAboveThreshold = energy > this.energyThreshold;
                const canDetectHit = !this.lastDribbleTime || 
                                     (currentTime - this.lastDribbleTime) > this.minHitInterval;

                if (isAboveThreshold && canDetectHit) {
                    this.dribbleCount++;
                    this.lastDribbleTime = currentTime;
                    this.emitParticles();
                }

                const duration = currentTime - this.startTime;
                const minutes = duration / 60000;
                const hitsPerMinute = minutes > 0 ? this.dribbleCount / minutes : 0;

                document.getElementById('dribbleCount').textContent = this.dribbleCount;
                document.getElementById('frequency').textContent = hitsPerMinute.toFixed(1);
                document.getElementById('duration').textContent = this.formatDuration(duration);
                document.getElementById('peakFrequency').textContent = this.peakFrequency > 0 ? 
                    this.peakFrequency.toFixed(0) + ' Hz' : '--';
                document.getElementById('avgEnergy').textContent = avgEnergy.toFixed(1);

                if (this.dribbleCount > 0) {
                    document.getElementById('resetBtn').disabled = false;
                }

                this.updatePerformance(hitsPerMinute);

                requestAnimationFrame(() => this.detectLoop());
            }

            formatDuration(ms) {
                const seconds = Math.floor(ms / 1000);
                const minutes = Math.floor(seconds / 60);
                const remainingSeconds = seconds % 60;
                return `${minutes.toString().padStart(2, '0')}:${remainingSeconds.toString().padStart(2, '0')}`;
            }

            updatePerformance(hitsPerMinute) {
                const iconEl = document.getElementById('performanceIcon');
                const textEl = document.getElementById('performanceText');

                if (hitsPerMinute >= 60) {
                    iconEl.textContent = '⚡';
                    textEl.textContent = '专业级';
                    textEl.className = 'performance-text performance-professional';
                } else if (hitsPerMinute >= 40) {
                    iconEl.textContent = '🔥';
                    textEl.textContent = '优秀';
                    textEl.className = 'performance-text performance-excellent';
                } else if (hitsPerMinute >= 20) {
                    iconEl.textContent = '👍';
                    textEl.textContent = '良好';
                    textEl.className = 'performance-text performance-good';
                } else if (hitsPerMinute > 0) {
                    iconEl.textContent = '🎯';
                    textEl.textContent = '进行中';
                    textEl.className = 'performance-text performance-active';
                } else {
                    iconEl.textContent = '⏳';
                    textEl.textContent = '待开始';
                    textEl.className = 'performance-text performance-idle';
                }
            }

            emitParticles() {
                const centerX = this.particleCanvas.width / 2;
                const centerY = this.particleCanvas.height / 2;
                
                for (let i = 0; i < 20; i++) {
                    const angle = (Math.PI * 2 * i) / 20;
                    const speed = 3 + Math.random() * 3;
                    
                    this.particles.push({
                        x: centerX,
                        y: centerY,
                        vx: Math.cos(angle) * speed,
                        vy: Math.sin(angle) * speed,
                        life: 1,
                        color: Math.random() > 0.5 ? '#FF6B35' : '#F7B32B'
                    });
                }
            }

            renderLoop() {
                this.renderSpectrum();
                this.renderWaveform();
                this.renderParticles();
                
                requestAnimationFrame(() => this.renderLoop());
            }

            renderSpectrum() {
                const canvas = this.spectrumCanvas;
                const ctx = this.spectrumCtx;
                const width = canvas.getBoundingClientRect().width;
                const height = canvas.getBoundingClientRect().height;
                
                ctx.fillStyle = 'rgba(26, 26, 46, 0.3)';
                ctx.fillRect(0, 0, width, height);

                if (!this.isListening) {
                    ctx.fillStyle = 'rgba(107, 114, 128, 0.5)';
                    ctx.font = '16px Inter, sans-serif';
                    ctx.textAlign = 'center';
                    ctx.fillText('点击开始按钮启动篮球拍球检测', width / 2, height / 2);
                    return;
                }

                const barCount = 64;
                const barWidth = (width / barCount) - 2;
                const step = Math.floor(this.frequencyData.length / barCount);

                for (let i = 0; i < barCount; i++) {
                    const value = this.frequencyData[i * step];
                    const barHeight = (value / 255) * height;
                    
                    const gradient = ctx.createLinearGradient(0, height, 0, height - barHeight);
                    gradient.addColorStop(0, '#FF6B35');
                    gradient.addColorStop(0.5, '#F7B32B');
                    gradient.addColorStop(1, '#0F4C75');
                    
                    ctx.fillStyle = gradient;
                    
                    const x = i * (barWidth + 2);
                    const y = height - barHeight;
                    
                    ctx.beginPath();
                    ctx.roundRect(x, y, barWidth, barHeight, [4, 4, 0, 0]);
                    ctx.fill();

                    if (value > 180) {
                        ctx.shadowColor = '#FF6B35';
                        ctx.shadowBlur = 15;
                        ctx.fill();
                        ctx.shadowBlur = 0;
                    }
                }
            }

            renderWaveform() {
                const canvas = this.waveformCanvas;
                const ctx = this.waveformCtx;
                const width = canvas.getBoundingClientRect().width;
                const height = canvas.getBoundingClientRect().height;
                
                ctx.fillStyle = 'rgba(15, 76, 117, 0.3)';
                ctx.fillRect(0, 0, width, height);

                if (!this.isListening) return;

                ctx.lineWidth = 2;
                ctx.strokeStyle = '#F7B32B';
                ctx.beginPath();

                const sliceWidth = width / this.timeDomainData.length;
                let x = 0;

                for (let i = 0; i < this.timeDomainData.length; i++) {
                    const v = this.timeDomainData[i] / 128.0;
                    const y = (v * height) / 2;

                    if (i === 0) {
                        ctx.moveTo(x, y);
                    } else {
                        ctx.lineTo(x, y);
                    }

                    x += sliceWidth;
                }

                ctx.stroke();

                ctx.shadowColor = '#F7B32B';
                ctx.shadowBlur = 10;
                ctx.stroke();
                ctx.shadowBlur = 0;
            }

            renderParticles() {
                const canvas = this.particleCanvas;
                const ctx = this.particleCtx;
                const width = canvas.getBoundingClientRect().width;
                const height = canvas.getBoundingClientRect().height;
                
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                this.particles = this.particles.filter(p => {
                    p.x += p.vx;
                    p.y += p.vy;
                    p.life -= 0.02;
                    p.vy += 0.1;

                    if (p.life > 0) {
                        ctx.beginPath();
                        ctx.arc(p.x, p.y, 4 * p.life, 0, Math.PI * 2);
                        ctx.fillStyle = p.color;
                        ctx.globalAlpha = p.life;
                        ctx.fill();
                        ctx.globalAlpha = 1;
                        return true;
                    }
                    return false;
                });
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            new BasketballDribbleCounter();
        });
    </script>
</body>
</html>
